<body>

  <main class="doctors-page">
    <h1>Available Doctors</h1>

    <div class="doctor-filters">
  <input
    type="text"
    id="doctorSearch"
    placeholder="Search by name, specialty, or location"
  />

  <select id="specialtyFilter">
    <option value="">All Specialties</option>
  </select>

  <input
    type="text"
    id="locationFilter"
    placeholder="Filter by location"
  />

  <label class="checkbox-label">
    <input type="checkbox" id="availableOnlyFilter" />
    Available only
  </label>

  <button type="button" id="clearDoctorFilters">Clear Filters</button>
</div>

    <p id="doctorsMessage" class="form-message"></p>

    <section id="doctorsList" class="doctors-list"></section>
