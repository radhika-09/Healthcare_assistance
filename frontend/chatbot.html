<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Healthcare Chatbot</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>
  <nav>
  <h2>Healthcare Assistance</h2>

  <a href="index.html">Home</a>
  <a href="dashboard.html" class="auth-link">Dashboard</a>
  <a href="doctors.html">Doctors</a>
  <a href="chatbot.html">Chatbot</a>
  <a href="profile.html" class="auth-link">Profile</a>

  <a href="admin-appointments.html" class="doctor-admin-link">Manage Appointments</a>
  <a href="add-doctor.html" class="admin-link">Add Doctor</a>
  <a href="manage-doctors.html" class="admin-link">Manage Doctors</a>

  <a href="login.html" class="guest-link">Login</a>
  <a href="signup.html" class="guest-link">Signup</a>

  <button type="button" id="navLogoutBtn" class="auth-link">Logout</button>

</nav>

  <main class="chatbot-page">
    <h1>Healthcare Chatbot</h1>
    <div class="chat-actions">
  <button type="button" id="loadHistoryBtn">Load History</button>
  <button type="button" id="clearHistoryBtn">Clear History</button>
  </div>

    <div id="chatBox" class="chat-box">
      <div class="bot-message">
        Hello! I can give basic health guidance. How can I help you?
      </div>
    </div>

    <form id="chatForm" class="chat-form">
      <input
        type="text"
        id="messageInput"
        placeholder="Type your health question..."
        required
      />
      <button type="submit">Send</button>
    </form>
  </main>

  <script src="js/chatbot.js"></script>
  <script src="js/nav.js"></script>

</body>
</html>
