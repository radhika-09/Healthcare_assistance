<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Book Appointment | Healthcare Assistance</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>
  <nav>
  <h2>Healthcare Assistance</h2>

  <a href="index.html">Home</a>
  <a href="dashboard.html" class="auth-link">Dashboard</a>
  <a href="doctors.html">Doctors</a>
  <a href="chatbot.html">Chatbot</a>
  <a href="profile.html" class="auth-link">Profile</a>

  <a href="admin-appointments.html" class="doctor-admin-link">Manage Appointments</a>
  <a href="add-doctor.html" class="admin-link">Add Doctor</a>
  <a href="manage-doctors.html" class="admin-link">Manage Doctors</a>

  <a href="login.html" class="guest-link">Login</a>
  <a href="signup.html" class="guest-link">Signup</a>

  <button type="button" id="navLogoutBtn" class="auth-link">Logout</button>

</nav>

  <main class="appointment-page">
    <form id="appointmentForm" class="appointment-form">
      <h1>Book Appointment</h1>

      <label>Selected Doctor</label>
      <input type="text" id="doctorName" readonly />

      <label>Date</label>
      <input type="date" id="appointmentDate" required />

      <label>Time</label>
      <input type="time" id="appointmentTime" required />

      <label>Reason</label>
      <textarea
        id="appointmentReason"
        rows="4"
        placeholder="Describe your reason for appointment"
        required
      ></textarea>

      <button type="submit">Book Appointment</button>

      <p id="appointmentMessage" class="form-message"></p>
    </form>
  </main>

  <script src="js/appointment.js"></script>
  <script src="js/nav.js"></script>

</body>
</html>
